[changelog]
# changelog header
header = """
# Changelog
[//]: # "DO NOT EDIT THIS FILE MANUALLY"
[//]: # "This file is automatically generated using git-cliff"
[//]: # "See here for more information: https://git-cliff.org"
All notable changes to this project will be documented in this file.

This project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% macro print_commit(commit) -%}
- {% if commit.body %}<details>
{% raw %}  {% endraw %}<summary>{% endif %}\
  {% if commit.scope %}<em>({{ commit.scope }})</em> {% endif %}\
    {{ commit.message }} \
    (\
    <a href="<REPO>/commits/{{ commit.id }}">{{ commit.id | truncate(length=7, end='') }}</a>\
    {%- for issue in commit.footers | filter(attribute='separator', value=' #') -%}
        , <a href="<REPO>/issues/{{ issue.value }}">#{{ issue.value }}</a>\
    {%- endfor -%}
    )\

{%- if commit.body -%}
    {%- set body = commit.body | indent(prefix='  ', blank=true) -%}
    {%- if '```' not in commit.body -%}
        {% set body = body | replace(from='\n', to='<br>\n') -%}
    {%- endif -%}
    </summary>
    {% raw %}  {% endraw %}<blockquote>

    {% raw %}  {% endraw %}{{ body }}
    {% raw %}  {% endraw %}</blockquote>
    {% raw %}  {% endraw %}</details>
{%- endif -%}

{%- if commit.breaking -%}
    {% raw %}  {% endraw %}- **BREAKING**: {{commit.breaking_description}}
{%- endif -%}
{% endmacro print_commit -%}

{% set issues = [] %}
{%- for commit in commits -%}
    {%- for issue in commit.footers | filter(attribute='separator', value=' #') -%}
        {% set_global issues = issues | concat(with = '[#'~issue.value~'](<REPO>/issues/'~issue.value~')') %}
    {%- endfor -%}
{%- endfor -%}

    ## [{{ version | default(value='Unreleased') | trim_start_matches(pat='v') }}] - {{ timestamp | date(format='%Y-%m-%d') }}
{% if message %}
{{ message }}
{% endif %}
{% if issues | length > 0 %}Issues: {{ issues | sort | unique | join(sep=', ') }}{% raw %}\n {% endraw%}{% endif %}
{%- for group, commits in commits | group_by(attribute='group') %}
    ### {{ group }}
    {% for commit in commits
    | filter(attribute='scope')
    | sort(attribute='scope') %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor -%}
    {% raw %}\n{% endraw %}\
    {% for commit in commits %}
        {%- if commit.scope -%}{% continue %}{%- endif -%}
        {{ self::print_commit(commit=commit) }}
    {% endfor -%}
{% endfor %}\n\n
"""

# remove the leading and trailing whitespace from the template
trim = true

postprocessors = [
  { pattern = '<REPO>', replace = 'https://github.com/ttys3/unrar.rs' },
]

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
filter_commits = true
# keep BREAKING commits even if a later parser rule would `skip = true` them
# (rename release would have been silently dropped without this if a future
#  rule changes — cheap insurance)
protect_breaking_commits = true
# only generate changelog entries for v-prefixed release tags; skip random
# experimental / personal tags
tag_pattern = "v[0-9].*"
# explicit sort order (default is newest, make it visible for future maintainers)
sort_commits = "newest"

# Order matters — first matching rule wins. Keep example-scoped first so a
# `feat(example): ...` commit lands in Example rather than Features.
commit_parsers = [
  # Scope-based: example/examples scope wins over type-based grouping below.
  { message = "^[a-z]+\\(examples?\\)!?:", group = "<!--7-->Example" },

  # Type-based grouping (conventional commit prefixes).
  { message = "^fix",      group = "<!--1-->Bug Fixes" },
  { message = "^feat",     group = "<!--2-->Features" },
  { message = "^perf",     group = "<!--3-->Performance" },
  { message = "^test",     group = "<!--5-->Testing" },
  { message = "^doc",      group = "<!--6-->Documentation" },
  { message = "^style",    group = "<!--8-->Styling" },
  { message = "^revert",   group = "<!--9-->Revert" },

  # Skip rules — drop release / PR / pull noise from changelog.
  { message = "^chore\\(release\\): prepare for", skip = true },
  { message = "^chore\\(pr\\)",   skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "^.*\\bv[0-9]+\\.", skip = true },

  # Catch-all for build/ci/chore/refactor — must come after specific skips.
  { message = "^chore|^ci|^refactor|^build", group = "<!--4-->Miscellaneous / Refactors" },

  # Body-only matchers (e.g. security advisory backports without scoped subjects).
  { body = ".*security", group = "<!--2-->Security" },
]

# Auto-link #N issue / PR references in commit messages to GitHub.
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/ttys3/unrar.rs/issues/$1" },
]

