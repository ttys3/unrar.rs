name: ci

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - name: Windows 2022 x86_64
            os: windows-2022
          - name: Windows 2025 x86_64
            os: windows-2025
          # MacOS
          - name: MacOS 14
            os: macos-14
          - name: MacOS 15
            os: macos-15
          - name: MacOS 15 x86_64
            os: macos-15-intel
          - name: MacOS 26
            os: macos-26
          # Linux
          - name: Linux 24.04 x86_64
            os: ubuntu-24.04

    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Test unrar_sys library
      run: cargo test --verbose --package=unrar_sys
